substitutions:
  name: victron-esp-nodered
  device_description: "SmartSolarMPPT Victron - Read data. Set bulk,float,current,devicemode on off"
  tx_pin: GPIO39
  rx_pin: GPIO37

esphome:
  name: ${name}

esp32:
  board: lolin_s2_mini
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: 192.168.1.136
    gateway: 192.168.1.1
    subnet: 255.255.255.0

ota:
  platform: esphome

logger:
  baud_rate: 0
  level: VERBOSE

mqtt:
  broker: !secret mqtt_host
  discovery: false 
  topic_prefix: victron_esp32 
  on_message:
    - topic: victron_esp32/command/send_raw
      then:
        - lambda: |-
            if (x.length() > 0) {
              id(victron_uart).write_str(x.c_str());
              id(victron_uart).write_str("\n");
              ESP_LOGD("victron_serial", "MQTT - HEX inject: %s", x.c_str());
            }
    
uart:
  - id: victron_uart
    tx_pin: ${tx_pin}  # Connect to VIB ADUM1201
    rx_pin: ${rx_pin}  # Connect to VOA ADUM1201
    baud_rate: 19200
    rx_buffer_size: 512


text_sensor:
  - platform: template
    name: "Victron Stream Telemetry"
    id: telemetry_stream
    state_topic: "victron_esp32/telemetry/raw"


# GET data from UART
interval:
  - interval: 50ms
    then:
      - lambda: |-
          static std::string line_buffer = "";
          while (id(victron_uart).available() > 0) {
            uint8_t byte;
            // read framework
            if (id(victron_uart).read_byte(&byte)) {
              if (byte == '\n') {
                if (line_buffer.length() > 0) {
                  // publish to MQTT
                  id(telemetry_stream).publish_state(line_buffer);
                  line_buffer = "";
                }
              } else if (byte != '\r') {
                line_buffer += (char)byte;
              }
            }
          }